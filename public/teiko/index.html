<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030403" />
    <title>Где купить — TEIKO</title>
    <meta
      name="description"
      content="Официальные ссылки TEIKO: магазин на Ozon и основной сайт бренда."
    />
    <link rel="canonical" href="https://teiko.unity-constructor.site/teiko" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/teiko-links-v2.css" />
  </head>
  <body class="links-page">
    <main class="links-shell">
      <header class="packaging-hero">
        <a class="packaging-logo" href="/" aria-label="TEIKO — на главную">
          <img src="/assets/logo-back-motif.png" alt="TEIKO" />
        </a>
      </header>

      <div class="tech-divider" aria-hidden="true"><span>✦</span></div>

      <section class="links-group" aria-labelledby="marketplaces-title">
        <h1 id="marketplaces-title">Наша продукция на маркетплейсах</h1>

        <a
          class="teiko-link teiko-link-market"
          href="https://www.ozon.ru/seller/limeshop36"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Открыть магазин TEIKO на Ozon"
        >
          <span class="teiko-link-icon ozon-mark" aria-hidden="true"><i></i></span>
          <span class="teiko-link-copy">
            <strong>OZON</strong>
          </span>
        </a>
      </section>

      <div class="tech-divider" aria-hidden="true"><span>✦</span></div>

      <section class="links-group links-group-site" aria-labelledby="site-title">
        <h2 id="site-title">Больше информации на сайте</h2>

        <a class="teiko-link teiko-link-site" href="/" aria-label="Перейти на сайт TEIKO">
          <span class="teiko-link-icon globe-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <circle cx="24" cy="24" r="18"></circle>
              <path d="M6 24h36M24 6c6 6 8 12 8 18s-2 12-8 18M24 6c-6 6-8 12-8 18s2 12 8 18"></path>
            </svg>
          </span>
          <span class="teiko-link-copy">
            <strong>TEIKO.SITE</strong>
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
